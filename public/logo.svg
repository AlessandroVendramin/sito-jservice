<?xml version="1.0" encoding="UTF-8"?>
<svg width="140" height="28" viewBox="0 0 140 28" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">JService</title>
  <!-- JService logo - Professional cleaning service -->
  <g>
    <!-- Icon: Cleaning symbol (sparkle/star) -->
    <g transform="translate(2, 2)">
      <!-- Outer circle -->
      <circle cx="12" cy="10" r="10" fill="#2563EB" fill-opacity="0.12"/>
      <circle cx="12" cy="10" r="8" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      
      <!-- Sparkle lines -->
      <g stroke="#2563EB" stroke-width="2" stroke-linecap="round">
        <!-- Main lines -->
        <line x1="12" y1="0" x2="12" y2="4"/>
        <line x1="12" y1="16" x2="12" y2="20"/>
        <line x1="0" y1="10" x2="4" y2="10"/>
        <line x1="20" y1="10" x2="24" y2="10"/>
        <!-- Diagonal lines -->
        <line x1="3" y1="3" x2="6" y2="6"/>
        <line x1="21" y1="21" x2="18" y2="18"/>
        <line x1="21" y1="3" x2="18" y2="6"/>
        <line x1="3" y1="21" x2="6" y2="18"/>
      </g>
      
      <!-- Letter J inside -->
      <path d="M 8 5 L 8 13 Q 8 15 10 15 L 13 15" stroke="#2563EB" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    </g>
    
    <!-- Text: JService (using simple text element) -->
    <text x="32" y="19" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600" fill="#1E293B" letter-spacing="0.2px">JService</text>
  </g>
</svg>
